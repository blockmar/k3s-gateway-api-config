apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    name: demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index-page
  namespace: demo
data:
  index.html: |-
    <html>
    <h2>Hello world 1!!</h2>
    </html>
---    
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: demo
data:
  nginx.conf: |-
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {

      client_body_temp_path /tmp/client_temp;
      proxy_temp_path       /tmp/proxy_temp_path;
      fastcgi_temp_path     /tmp/fastcgi_temp;
      uwsgi_temp_path       /tmp/uwsgi_temp;
      scgi_temp_path        /tmp/scgi_temp;

      server {
        listen 8080;
        server_name _;

        port_in_redirect off;

        location /demo {
            alias  /usr/share/nginx/html;
            index  index.html;
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: demo
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: nginx
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      automountServiceAccountToken: false
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.29.5
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-index-config
          mountPath: /usr/share/nginx/html
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: nginx-index-config
        configMap:
          name: nginx-index-page
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-route
  namespace: demo
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: kube-system
  rules:
  - backendRefs:
    - name: nginx-service
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /demo
